services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: calculatrice-devops-app:latest
    expose:
      - '5000'
    restart: unless-stopped

  nginx:
    image: nginx:stable-alpine
    depends_on:
      - app
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
