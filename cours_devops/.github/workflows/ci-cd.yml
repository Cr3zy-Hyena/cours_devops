name: CI/CD Pipeline Complet

on:
  push:
    branches: [main]

jobs:
  tests:
    name: Tests unitaires
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt pytest
      - run: python -m pytest tests/ -v
