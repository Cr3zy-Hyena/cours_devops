upstream flask_app { server web:5000; }
server {
    listen 80;
    server_name _;
    location /static/ {
        alias /app/app/static/;
        expires 1d;
}
location / {
    proxy_pass http://flask_app;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_connect_timeout 60s;
    proxy_read_timeout 60s;
    }
}