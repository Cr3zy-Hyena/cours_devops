{% extends "base.html" %}

{% block content %}

<h2>Créer un compte</h2>

<form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <input type="text" name="username" required>

    <input type="password" name="password" required>

    <button type="submit">
        Créer le compte
    </button>

</form>

{% endblock %}
