<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}DevPortfolio{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav>
        <a href="{{ url_for('main.index') }}">Accueil</a>
        <a href="{{ url_for('main.a_propos') }}">À propos</a>
        {% if current_user.is_authenticated %}
        <a href="{{ url_for('main.logout') }}" class="btn-logout">Déconnexion</a>
        {% endif %}
    </nav>
    <main>{% block content %}{% endblock %}</main>
    <footer><p>DevPortfolio</p></footer>
</body>
</html>
