{% extends 'base.html' %}

{% block title %}Mes Projets{% endblock %}

{% block content %}
<h1>Mes Projets</h1>
{% for projet in projets %}
<div class="carte">
    <h2>{{ projet.titre }}</h2>
    <p>{{ projet.description }}</p>
    <a href="{{ url_for('main.detail_projet', id=projet.id) }}">Voir</a>
</div>
{% else %}
<p>Aucun projet pour l'instant.</p>
{% endfor %}
{% endblock %}
