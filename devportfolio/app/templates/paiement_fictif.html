<script>
// Formatage automatique du numéro de carte
document.getElementById('carte').addEventListener('input', function(e) {
  let v = e.target.value.replace(/\D/g, '').substring(0, 16);
  e.target.value = v.replace(/(.{4})/g, '$1 ').trim();
});

// Formatage MM/AA
document.getElementById('expiry').addEventListener('input', function(e) {
  let v = e.target.value.replace(/\D/g, '').substring(0, 4);
  if (v.length >= 2) v = v.substring(0,2) + '/' + v.substring(2);
  e.target.value = v;
});

// Soumission du formulaire
document.getElementById('checkout-form').addEventListener('submit', async function(e) {
  e.preventDefault();

  const prenom = document.getElementById('prenom').value.trim();
  const nom = document.getElementById('nom').value.trim();
  const carte = document.getElementById('carte').value.trim();
  const expiry = document.getElementById('expiry').value.trim();
  const cvv = document.getElementById('cvv').value.trim();
  const errDiv = document.getElementById('error-msg');

  // Validation minimale
  if (!prenom || !nom) {
    errDiv.textContent = 'Veuillez saisir votre prénom et nom.';
    errDiv.style.display = 'block'; return;
  }
  if (carte.replace(/\s/g,'').length < 16) {
    errDiv.textContent = 'Numéro de carte invalide (16 chiffres requis).';
    errDiv.style.display = 'block'; return;
  }
  if (!expiry.match(/^\d{2}\/\d{2}$/)) {
    errDiv.textContent = 'Date d\'expiration invalide (MM/AA).';
    errDiv.style.display = 'block'; return;
  }
  if (cvv.length < 3) {
    errDiv.textContent = 'CVV invalide (3 chiffres requis).';
    errDiv.style.display = 'block'; return;
  }

  errDiv.style.display = 'none';
  document.getElementById('loading').style.display = 'flex';
  document.getElementById('btn-pay').disabled = true;

  // Appel à la route de déverrouillage
  try {
    const resp = await fetch('{{ url_for("main.debloquer_fictif", id=projet.id) }}', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-CSRFToken': '{{ csrf_token() }}'
      },
      body: JSON.stringify({ prenom, nom })
    });

    if (resp.ok) {
      const data = await resp.json();
      window.location.href = data.redirect;
    } else {
      throw new Error('Erreur serveur');
    }
  } catch(err) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('btn-pay').disabled = false;
    errDiv.textContent = 'Erreur lors du paiement. Réessayez.';
    errDiv.style.display = 'block';
  }
});
</script>
