version: '3.9'

services:
  web:
    build: .
    container_name: devportfolio-web
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - SECRET_KEY=${SECRET_KEY}
      - FLASK_ENV=production
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    expose:
      - '5000'
    ports:
      - '5000:5000'
    networks:
      - backend

  prometheus:
    image: prom/prometheus:v2.47.0
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    ports: ['9090:9090']
    networks: [backend]

  grafana:
    image: grafana/grafana:10.2.0
    ports: ['3000:3000']
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-changeme}
    volumes:
      - grafdata:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    networks: [backend]

  nginx:
    image: nginx:1.25-alpine
    container_name: devportfolio-nginx
    restart: unless-stopped
    ports:
      - '80:80'
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
    networks:
      - backend

  db:
    image: postgres:15-alpine
    container_name: devportfolio-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-devuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-devportfolio}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-devuser} -d ${POSTGRES_DB:-devportfolio}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [backend]

  redis:
    image: redis:7-alpine
    container_name: devportfolio-redis
    networks: [backend]

networks:
  backend:
    driver: bridge

volumes:
  pgdata:
    name: devportfolio_pgdata
  promdata:
    name: devportfolio_promdata
  grafdata:
    name: devportfolio_grafdata