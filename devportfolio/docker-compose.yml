version: '3.9'

services:
  web:
    build: .
    container_name: devportfolio-web
    restart: unless-stopped

    environment:
      - DATABASE_URL=postgresql://devuser:devpass@db:5432/devportfolio
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-dev-key}
      - FLASK_ENV=production

    depends_on:
      db:
        condition: service_healthy

    expose:
      - '5000'
    ports:
      - '5000:5000'   # exposé à l'hôte pour curl http://localhost:5000/metrics

    networks:
      - backend

  prometheus:
    image: prom/prometheus:v2.47.0
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    ports: ['9090:9090']
    networks: [backend]

  grafana:
    image: grafana/grafana:10.2.0
    ports: ['3000:3000']
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafdata:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro  # datasource + dashboard automatiques
    networks: [backend]

  nginx:
    image: nginx:1.25-alpine
    container_name: devportfolio-nginx
    restart: unless-stopped
    ports:
      - '80:80'
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
    networks:
      - backend

  db:
    image: postgres:15-alpine
    container_name: devportfolio-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: devportfolio
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U devuser -d devportfolio']
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [backend]

  redis:
    image: redis:7-alpine
    container_name: devportfolio-redis
    networks: [backend]

networks:
  backend:
    driver: bridge

volumes:
  pgdata:
    name: devportfolio_pgdata
  promdata:
    name: devportfolio_promdata
  grafdata:
    name: devportfolio_grafdata