name: Calculatrice DevOps CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    name: Tests unitaires
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Installer les dépendances de test
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r cours_devops_jour/jour3/requirements.txt
          python -m pip install pytest
      - name: Lancer les tests
        run: python -m pytest -q cours_devops_jour/jour3/tests -q

  build-docker:
    name: Build Docker
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - uses: actions/checkout@v4
      - name: Se connecter à Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Construire et pousser l'image Docker
        uses: docker/build-push-action@v5
        with:
          context: ./cours_devops_jour/jour3
          file: ./cours_devops_jour/jour3/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/calculatrice-devops:latest

  deploy:
    name: Vérifier le déploiement Docker Hub
    runs-on: ubuntu-latest
    needs: build-docker
    steps:
      - name: Se connecter à Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Vérifier l'image publiée
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/calculatrice-devops:latest
          docker image inspect ${{ secrets.DOCKERHUB_USERNAME }}/calculatrice-devops:latest
