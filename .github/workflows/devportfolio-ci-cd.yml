name: DevPortfolio CI/CD

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'devportfolio/**'
      - '.github/workflows/devportfolio-ci-cd.yml'
  pull_request:
    branches: [main]
    paths:
      - 'devportfolio/**'
      - '.github/workflows/devportfolio-ci-cd.yml'

jobs:
  tests:
    name: Tests DevPortfolio
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: devportfolio

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: devportfolio/requirements.txt

      - name: Installer les dependances
        run: pip install -r requirements.txt

      - name: Lancer les tests
        working-directory: ./devportfolio
        env:
          DATABASE_URL: 'sqlite:///:memory:'
          PYTHONPATH: .
        run: pytest tests/ -v --cov=app --cov-report=xml

  build-and-push:
    name: Build et Push Docker
    runs-on: ubuntu-latest
    needs: tests
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Se connecter a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Construire et pousser l'image
        uses: docker/build-push-action@v5
        with:
          context: ./devportfolio
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/devportfolio:latest
